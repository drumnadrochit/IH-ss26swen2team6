services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: tourplanner
      POSTGRES_USER: touruser
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in a .env file (see .env.example)}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U touruser -d tourplanner"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "5000:8080"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      ConnectionStrings__Default: "Host=postgres;Port=5432;Database=tourplanner;Username=touruser;Password=${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in a .env file (see .env.example)}"
      JwtSettings__SecretKey: "${JWT_SECRET_KEY:?Set JWT_SECRET_KEY (min 32 chars) in a .env file (see .env.example)}"
      JwtSettings__Issuer: "TourPlanner"
      JwtSettings__Audience: "TourPlannerUsers"
      OpenRouteService__ApiKey: "${ORS_API_KEY:?Set ORS_API_KEY in a .env file (see .env.example)}"
      OpenRouteService__BaseUrl: "https://api.openrouteservice.org"
      Storage__BasePath: "/app/uploaded_images"
      AllowedOrigins: "http://localhost"
    volumes:
      - uploaded_images:/app/uploaded_images

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  postgres_data:
  uploaded_images:
